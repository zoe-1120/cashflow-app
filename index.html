<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>现金流诊断平台</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <style>
    :root {
      --bg: #002528;
      --card: #003330;
      --gold: #b09b7b;
      --text: #e8e0d4;
      --muted: #9a9080;
      --red: #e05c5c;
      --green: #4dbf91;
      --border: #005050;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
    }
    .header {
      background: linear-gradient(135deg, #001a1c, #002528);
      border-bottom: 2px solid var(--gold);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
    }
    .nav-buttons {
      display: flex;
      gap: 10px;
    }
    .nav-btn {
      padding: 8px 16px;
      background: var(--border);
      border: none;
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s;
    }
    .nav-btn:hover {
      background: var(--gold);
      color: var(--bg);
    }
    .nav-btn.active {
      background: var(--gold);
      color: var(--bg);
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
    
    /* HOME PAGE */
    .home-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 30px;
    }
    @media (max-width: 700px) {
      .home-grid { grid-template-columns: 1fr; }
    }
    .home-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 30px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .home-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
    }
    .home-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .home-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .home-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    
    /* IMPORT PAGE */
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .sec-hd {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      background: #001a20;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
    }
    .drop-zone.hover {
      border-color: var(--gold);
      background: #002a35;
    }
    .drop-zone input { display: none; }
    .drop-zone p { margin: 8px 0; color: var(--muted); }
    .btn {
      padding: 10px 20px;
      background: var(--gold);
      color: #001a1c;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .btn:hover { background: #c9a66e; }
    .result-box {
      background: #001a20;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      display: none;
    }
    .result-box.success {
      border-color: var(--green);
      background: #001a0e;
      color: var(--green);
      display: block;
    }
    .result-box.error {
      border-color: var(--red);
      background: #1a0505;
      color: var(--red);
      display: block;
    }
    .supported-formats {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">💰 现金流诊断平台</div>
  <div class="nav-buttons">
    <button class="nav-btn active" onclick="showPage('home')">🏠 首页</button>
    <button class="nav-btn" onclick="showPage('import')">📥 导入数据</button>
    <button class="nav-btn" onclick="showPage('dashboard')">📊 Dashboard</button>
  </div>
</div>

<div class="container">
  <!-- HOME PAGE -->
  <div id="home" class="page active">
    <h2 style="color: var(--gold); margin-bottom: 20px;">选择功能</h2>
    <div class="home-grid">
      <div class="home-card" onclick="showPage('import')">
        <div class="home-icon">📥</div>
        <div class="home-title">导入财务数据</div>
        <div class="home-desc">上传 Excel / CSV / PDF 文件，自动解析财务数据，智能识别关键字段</div>
      </div>
      <div class="home-card" onclick="showPage('dashboard')">
        <div class="home-icon">📊</div>
        <div class="home-title">Executive Dashboard</div>
        <div class="home-desc">7个分析标签页，全面诊断公司财务健康状况</div>
      </div>
    </div>
  </div>

  <!-- IMPORT PAGE -->
  <div id="import" class="page">
    <div class="section">
      <div class="sec-hd">📥 上传文件</div>
      <div class="supported-formats">
        ✅ 支持格式：Excel (.xlsx, .xls) | CSV (.csv) | PDF (.pdf) | 文本文件 (.txt)
      </div>
      
      <div class="drop-zone" id="dropZone">
        <p style="font-size: 14px; font-weight: 700;">📤 拖放文件到此</p>
        <p style="font-size: 11px;">或点击选择任何格式的文件</p>
        <input type="file" id="fileInput">
      </div>
      
      <div id="result" class="result-box"></div>
    </div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashboard" class="page">
    <iframe src="dashboard.html" style="width: 100%; height: 100vh; border: none;"></iframe>
  </div>
</div>

<script>
pdfjsWorker.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

function showPage(pageName) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageName).classList.add('active');
  
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// FILE UPLOAD
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const resultBox = document.getElementById('result');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('hover');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('hover');
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('hover');
  handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  
  if (ext === 'xlsx' || ext === 'xls') {
    parseExcel(file);
  } else if (ext === 'csv') {
    parseCSV(file);
  } else if (ext === 'pdf') {
    parsePDF(file);
  } else if (ext === 'txt') {
    parseTXT(file);
  } else {
    showResult('📥 开始处理文件: ' + file.name, 'success');
    parseText(file);
  }
}

function parseExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);
      showResult('✅ Excel 解析成功！ ' + json.length + ' 行数据。请前往 Dashboard 查看！', 'success');
    } catch (err) {
      showResult('❌ Excel 解析失败：' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    Papa.parse(e.target.result, {
      header: true,
      complete: results => {
        showResult('✅ CSV 解析成功！ ' + results.data.length + ' 行数据。请前往 Dashboard 查看！', 'success');
      },
      error: err => showResult('❌ CSV 解析失败', 'error')
    });
  };
  reader.readAsText(file);
}

function parsePDF(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const pdf = pdfjsLib.getDocument(new Uint8Array(e.target.result));
    pdf.promise.then(doc => {
      let text = '';
      let pages = 0;
      
      const processPage = pageNum => {
        if (pageNum > doc.numPages) {
          showResult('✅ PDF 提取成功！共 ' + pages + ' 页。\n\n📋 提取的文本（前500字）：\n\n' + text.substring(0, 500) + (text.length > 500 ? '...' : '') + '\n\n请在 Dashboard 中查看详细数据！', 'success');
          return;
        }
        
        doc.getPage(pageNum).then(page => {
          page.getTextContent().then(content => {
            text += content.items.map(item => item.str).join('') + '\n';
            pages++;
            processPage(pageNum + 1);
          });
        });
      };
      
      processPage(1);
    }).catch(err => showResult('❌ PDF 解析失败：' + err.message, 'error'));
  };
  reader.readAsArrayBuffer(file);
}

function parseTXT(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    showResult('✅ 文本文件读取成功！\n\n📋 内容（前500字）：\n\n' + text.substring(0, 500) + (text.length > 500 ? '...' : '') + '\n\n请在 Dashboard 中查看数据！', 'success');
  };
  reader.readAsText(file);
}

function parseText(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    showResult('✅ 文件读取成功！请在 Dashboard 中使用数据。', 'success');
  };
  reader.readAsText(file).catch(() => reader.readAsArrayBuffer(file));
}

function showResult(msg, type = 'error') {
  resultBox.textContent = msg;
  resultBox.className = 'result-box ' + type;
}
</script>

</body>
</html>
