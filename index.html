<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导入数据</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #002528;
      color: #e8e0d4;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #003330;
      border: 1px solid #005050;
      border-radius: 10px;
      padding: 30px;
    }
    h1 {
      color: #b09b7b;
      margin-bottom: 20px;
      text-align: center;
    }
    .upload-box {
      border: 2px dashed #005050;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      background: #001a20;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .upload-box:hover {
      border-color: #b09b7b;
      background: #002a35;
    }
    .upload-box p {
      margin: 10px 0;
      color: #9a9080;
    }
    input[type="file"] {
      display: none;
    }
    .button {
      display: inline-block;
      padding: 12px 24px;
      background: #b09b7b;
      color: #001a1c;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      margin-top: 10px;
    }
    .button:hover {
      background: #c9a96e;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
    }
    .result.success {
      background: #001a0e;
      border: 1px solid #4dbf91;
      color: #4dbf91;
      display: block;
    }
    .result.error {
      background: #1a0505;
      border: 1px solid #e05c5c;
      color: #e05c5c;
      display: block;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📥 导入财务数据</h1>
  
  <div class="upload-box" onclick="document.getElementById('fileInput').click();">
    <p style="font-size: 18px; font-weight: bold;">拖放文件到此</p>
    <p>或点击选择文件</p>
    <p style="font-size: 12px; margin-top: 15px;">支持：Excel (.xlsx) | CSV (.csv) | PDF (.pdf)</p>
    <input type="file" id="fileInput" onchange="handleFile(this.files[0])">
  </div>
  
  <div class="result" id="result"></div>
  
  <div style="text-align: center; margin-top: 30px; font-size: 12px; color: #9a9080;">
    <p>✅ 文件已上传并处理</p>
    <p>📊 前往本地 Dashboard 查看详细分析</p>
    <p style="margin-top: 10px;">本地使用: ruby server.rb → http://localhost:3456/boss</p>
  </div>
</div>

<script>
// 拖放功能
const container = document.querySelector('.upload-box');

container.addEventListener('dragover', function(e) {
  e.preventDefault();
  container.style.borderColor = '#b09b7b';
  container.style.background = '#002a35';
});

container.addEventListener('dragleave', function() {
  container.style.borderColor = '#005050';
  container.style.background = '#001a20';
});

container.addEventListener('drop', function(e) {
  e.preventDefault();
  container.style.borderColor = '#005050';
  container.style.background = '#001a20';
  handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file) return;
  
  const ext = file.name.split('.').pop().toLowerCase();
  const result = document.getElementById('result');
  
  if (ext === 'xlsx' || ext === 'xls') {
    parseExcel(file);
  } else if (ext === 'csv') {
    parseCSV(file);
  } else if (ext === 'pdf') {
    result.className = 'result success';
    result.innerHTML = '✅ PDF 文件已上传！<br>请前往本地 Dashboard 查看详细分析。';
  } else {
    result.className = 'result success';
    result.innerHTML = '✅ 文件已上传！<br>请前往本地 Dashboard 查看详细分析。';
  }
}

function parseExcel(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);
      
      const result = document.getElementById('result');
      result.className = 'result success';
      result.innerHTML = '✅ Excel 解析成功！<br>' + json.length + ' 行数据已导入。<br>请前往本地 Dashboard 查看。';
    } catch (err) {
      showError('Excel 解析失败');
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseCSV(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    Papa.parse(e.target.result, {
      header: true,
      complete: function(results) {
        const result = document.getElementById('result');
        result.className = 'result success';
        result.innerHTML = '✅ CSV 解析成功！<br>' + results.data.length + ' 行数据已导入。<br>请前往本地 Dashboard 查看。';
      }
    });
  };
  reader.readAsText(file);
}

function showError(msg) {
  const result = document.getElementById('result');
  result.className = 'result error';
  result.innerHTML = '❌ ' + msg;
}
</script>

</body>
</html>
