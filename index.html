<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>现金流诊断平台</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #002528;
      --card: #003330;
      --gold: #b09b7b;
      --text: #e8e0d4;
      --muted: #9a9080;
      --border: #005050;
      --success: #4dbf91;
      --error: #e05c5c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }
    .header {
      background: linear-gradient(135deg, #001a1c, #002528);
      border-bottom: 2px solid var(--gold);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 13px; font-weight: 700; color: var(--gold); }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .page { display: none; }
    .page.active { display: block; }

    /* HOME PAGE */
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 60px;
    }
    @media (max-width: 900px) {
      .home-grid { grid-template-columns: 1fr; }
    }
    .feature-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 40px 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .feature-card:hover {
      border-color: var(--gold);
      background: #004040;
    }
    .feature-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .feature-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--gold);
      margin-bottom: 15px;
    }
    .feature-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* UPLOAD PAGE */
    .upload-box {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 60px;
      text-align: center;
      background: #001a20;
      cursor: pointer;
      margin: 30px 0;
      transition: all 0.3s;
    }
    .upload-box:hover {
      border-color: var(--gold);
      background: #002a35;
    }
    .upload-box p { margin: 10px 0; color: var(--muted); }
    input[type="file"] { display: none; }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
      border: 1px solid;
    }
    .result.success {
      background: #001a0e;
      border-color: var(--success);
      color: var(--success);
      display: block;
    }
    .file-list {
      margin-top: 30px;
      max-height: 400px;
      overflow-y: auto;
    }
    .file-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .file-item.success { border-left: 3px solid var(--success); }

    /* ANALYSIS PAGE */
    .tabs {
      display: flex;
      background: #001e22;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      margin: 20px 0;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      font-size: 12px;
      transition: all 0.15s;
      border: none;
      background: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .kpi-value { font-size: 20px; font-weight: bold; color: var(--gold); }

    .data-table {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th {
      background: #001820;
      padding: 8px;
      text-align: left;
      color: var(--gold);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 8px; border-bottom: 1px solid var(--border); }

    .back-btn {
      background: var(--gold);
      color: #002528;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .back-btn:hover { background: #c9a66e; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">💰 现金流诊断平台</div>
</div>

<div class="container">
  <!-- HOME PAGE -->
  <div id="home" class="page active">
    <h1 style="text-align: center; color: var(--gold); margin: 40px 0;">现金流诊断平台</h1>
    <p style="text-align: center; color: var(--muted); margin-bottom: 60px;">选择功能开始</p>
    
    <div class="home-grid">
      <div class="feature-card" onclick="goToUpload()">
        <div class="feature-icon">📥</div>
        <div class="feature-title">导入财务数据</div>
        <div class="feature-desc">上传 Excel / CSV / PDF 文件，自动解析财务数据，智能识别关键指标</div>
      </div>
      <div class="feature-card" onclick="goToDashboard()">
        <div class="feature-icon">📊</div>
        <div class="feature-title">Executive Dashboard</div>
        <div class="feature-desc">7个分析标签页，全面诊断公司财务健康状况，识别改善机会</div>
      </div>
    </div>
  </div>

  <!-- UPLOAD PAGE -->
  <div id="upload" class="page">
    <button class="back-btn" onclick="goHome()">← 返回首页</button>
    <h2 style="color: var(--gold); margin-bottom: 20px;">📥 导入财务数据</h2>

    <div class="upload-box" id="dropZone">
      <p style="font-size: 20px; font-weight: bold;">📤 拖放文件到此</p>
      <p>或点击选择文件</p>
      <p style="font-size: 12px; margin-top: 15px;">支持：Excel (.xlsx, .xls) | CSV (.csv) | PDF (.pdf)</p>
      <p style="font-size: 11px; color: var(--success); margin-top: 10px;">💡 可以一次选择多个文件</p>
      <input type="file" id="fileInput" multiple onchange="handleFileInput(this)">
    </div>

    <div class="result" id="result"></div>
    <div class="file-list" id="fileList"></div>

    <div id="analyzeBtn" style="display: none; margin-top: 30px; text-align: center;">
      <button class="back-btn" style="background: var(--success); color: #000; padding: 15px 40px; font-size: 14px;" onclick="goToAnalysis()">
        查看数据分析 →
      </button>
    </div>
  </div>

  <!-- ANALYSIS PAGE -->
  <div id="analysis" class="page">
    <button class="back-btn" onclick="goHome()">← 返回首页</button>
    <h2 style="color: var(--gold); margin-bottom: 20px;">📊 数据分析</h2>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview', this)">📈 概览</button>
      <button class="tab" onclick="switchTab('detail', this)">📋 详情</button>
      <button class="tab" onclick="switchTab('trend', this)">📊 趋势</button>
    </div>

    <div id="overview" class="tab-content active">
      <div class="kpi-grid" id="kpiGrid"></div>
      <div id="summaryText" style="background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 20px; color: var(--muted);"></div>
    </div>

    <div id="detail" class="tab-content">
      <div class="data-table">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>描述</th>
              <th>金额</th>
              <th>类型</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <div id="trend" class="tab-content">
      <div id="trendText" style="background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: center; color: var(--muted);">处理趋势数据中...</div>
    </div>
  </div>
</div>

<script>
function goHome() { switchPage('home'); }
function goToUpload() { switchPage('upload'); }
function goToDashboard() { alert('本功能需要在本地运行: ruby server.rb → http://localhost:3456/boss'); }
function goToAnalysis() { switchPage('analysis'); }

function switchPage(pageName) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageName).classList.add('active');
  window.scrollTo(0, 0);
}

function switchTab(tabName, button) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  button.classList.add('active');
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const result = document.getElementById('result');
const fileList = document.getElementById('fileList');
const analyzeBtn = document.getElementById('analyzeBtn');

let uploadedFiles = [];
let csvData = [];

// Drag & drop
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.style.borderColor = '#b09b7b';
  dropZone.style.background = '#002a35';
});
dropZone.addEventListener('dragleave', () => {
  dropZone.style.borderColor = '#005050';
  dropZone.style.background = '#001a20';
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.borderColor = '#005050';
  dropZone.style.background = '#001a20';
  handleMultipleFiles(e.dataTransfer.files);
});

function handleFileInput(input) {
  if (input.files) {
    handleMultipleFiles(input.files);
  }
}

function handleMultipleFiles(files) {
  for (let i = 0; i < files.length; i++) {
    handleFile(files[i]);
  }
}

function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'xlsx' || ext === 'xls') {
    parseExcel(file);
  } else if (ext === 'csv') {
    parseCSV(file);
  } else {
    addFileToList(file, 'success', '✅ 已上传');
  }
}

function parseExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);
      addFileToList(file, 'success', '✅ ' + json.length + ' 行');
    } catch (err) {
      addFileToList(file, 'error', '❌ 失败');
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    Papa.parse(e.target.result, {
      header: true,
      dynamicTyping: true,
      complete: results => {
        csvData = results.data.filter(row => row.Date || row.date || row.DATE);
        addFileToList(file, 'success', '✅ ' + csvData.length + ' 行');
        generateAnalysis();
      },
      error: () => addFileToList(file, 'error', '❌ 失败')
    });
  };
  reader.readAsText(file);
}

function addFileToList(file, status, msg) {
  const item = document.createElement('div');
  item.className = 'file-item ' + status;
  item.innerHTML = '<strong>' + file.name + '</strong> (' + (file.size / 1024).toFixed(1) + ' KB)<br><small>' + msg + '</small>';
  fileList.appendChild(item);
  uploadedFiles.push(file.name);

  result.className = 'result success';
  result.innerHTML = '✅ 已处理 ' + uploadedFiles.length + ' 个文件';
  analyzeBtn.style.display = 'block';
}

function generateAnalysis() {
  if (csvData.length === 0) return;

  let totalIn = 0, totalOut = 0;
  const transactions = [];

  csvData.forEach(row => {
    const date = row.Date || row.date || row.DATE || '';
    const desc = row.Description || row.description || '';
    const amount = parseFloat(row.Amount || row.amount || 0);
    const type = (row.Type || row.type || '').toLowerCase();

    if (date && amount) {
      const isIn = type.includes('in') || type.includes('收入');
      if (isIn) totalIn += amount;
      else totalOut += amount;
      
      transactions.push({ date, desc, amount, type: isIn ? 'In' : 'Out', isIn });
    }
  });

  transactions.sort((a, b) => new Date(a.date) - new Date(b.date));

  // KPI
  const kpiHtml = `
    <div class="kpi-card"><div class="kpi-label">总收入</div><div class="kpi-value" style="color:#4dbf91;">¥${totalIn.toFixed(0)}</div></div>
    <div class="kpi-card"><div class="kpi-label">总支出</div><div class="kpi-value" style="color:#e05c5c;">¥${totalOut.toFixed(0)}</div></div>
    <div class="kpi-card"><div class="kpi-label">净现金</div><div class="kpi-value" style="color:${(totalIn-totalOut)>=0?'#4dbf91':'#e05c5c'};">¥${(totalIn-totalOut).toFixed(0)}</div></div>
    <div class="kpi-card"><div class="kpi-label">交易笔数</div><div class="kpi-value">${transactions.length}</div></div>
  `;
  document.getElementById('kpiGrid').innerHTML = kpiHtml;

  document.getElementById('summaryText').innerHTML = `
    <strong>📊 数据概览</strong><br>
    总收入: ¥${totalIn.toFixed(2)}<br>
    总支出: ¥${totalOut.toFixed(2)}<br>
    净现金: ¥${(totalIn-totalOut).toFixed(2)}<br>
    交易数: ${transactions.length} 笔<br>
    <br>
    <span style="font-size: 11px; color: var(--muted);">点击"详情"标签页查看完整交易记录</span>
  `;

  document.getElementById('tableBody').innerHTML = transactions.map(t => `
    <tr>
      <td>${t.date}</td>
      <td>${t.desc || '-'}</td>
      <td style="text-align:right;color:${t.isIn?'#4dbf91':'#e05c5c'};">¥${t.amount.toFixed(2)}</td>
      <td>${t.type}</td>
    </tr>
  `).join('');
}
</script>

</body>
</html>
